# Nombre de tu microservicio
spring.application.name=result-service

# Puerto de tu servicio (Cambiado al 8088 como te pidió tu compa)
server.port=8088

# Configuración de tu Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_esports_resultados?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================================================================
# RUTA HACIA EL MICROSERVICIO DE TU COMPA (MATCH-SERVICE)
# ===================================================================
# Tu MatchClient usa esta variable para conectarse al puerto 8087 de Match
match.service.url=http://localhost:8087

# ===================================================================
# TU PROPIA RUTA (RESULT-SERVICE) PARA EL RESULTADO-CLIENT
# ===================================================================
# Tu ResultadoClient usa esta variable apuntando a tu nuevo puerto 8088
result.service.url=http://localhost:8088