spring.application.name=eureka-server

# Puerto estandar del servidor Eureka. El panel queda visible en http://localhost:8761
server.port=8761

# El propio servidor Eureka NO se registra a si mismo ni descarga el registro:
# el es el registro central de los demas servicios.
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
