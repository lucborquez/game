# Nombre de la aplicación
spring.application.name=game-service

# Puerto(cada microservicio tendrá uno diferente)
server.port=8081

# Conexion a MySql
spring.datasource.url = jdbc:mysql://localhost:3306/db_game_service?createDatabaseIfNotExist=true
spring.datasource.username = root
spring.datasource.password =
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver

# JPA - Hibernate crea las tablas
spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql = true
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect