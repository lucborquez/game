spring.application.name=sanction-service
server.port=8090

# Conexion a MySQL - Laragon
spring.datasource.url=jdbc:mysql://localhost:3306/db_sanction_service?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - Hibernate crea las tablas automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
